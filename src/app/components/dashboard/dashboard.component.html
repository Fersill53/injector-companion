<div class="min-h-screen bg-canvas font-body">

  <header class="flex items-center justify-between max-w-md mx-auto px-4 pt-6">
    <p class="font-mono text-xs tracking-[0.2em] text-muted uppercase">Injector Companion</p>
    <a
      routerLink="/account"
      aria-label="Account"
      class="inline-flex items-center justify-center w-9 h-9 rounded-full text-muted hover:text-ink hover:bg-surface transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5">
        <path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12Zm0 2.4c-3.3 0-9.8 1.6-9.8 4.9v2.4h19.6v-2.4c0-3.3-6.5-4.9-9.8-4.9Z"/>
      </svg>
    </a>
  </header>

  <div class="flex items-center justify-center px-4 py-10">
    <div class="w-full max-w-md text-center">

      @if (user$ | async; as user) {
        <h1 class="font-display text-3xl font-semibold text-ink mb-3">
          Welcome back{{ user.displayName ? ', ' + user.displayName : '' }}
        </h1>
        <p class="text-sm text-muted mb-8">Signed in as {{ user.email }}</p>
      } @else {
        <h1 class="font-display text-3xl font-semibold text-ink mb-3">Welcome back</h1>
      }

      <div class="bg-surface rounded-2xl shadow-sm border border-ink/5 p-5 space-y-3">
        <a
          routerLink="/calculator"
          class="block w-full bg-sage hover:bg-sage-dark text-white font-medium text-sm rounded-lg py-2.5 transition-colors">
          Open dosing calculator
        </a>
        <a
          routerLink="/patients"
          class="block w-full bg-surface hover:bg-canvas text-ink font-medium text-sm rounded-lg py-2.5 border border-ink/15 transition-colors">
          View patients
        </a>
        <a
          routerLink="/prices"
          class="block w-full bg-surface hover:bg-canvas text-ink font-medium text-sm rounded-lg py-2.5 border border-ink/15 transition-colors">
          Manage prices
        </a>
      </div>

    </div>
  </div>
</div>
