<div class="min-h-screen bg-canvas font-body flex items-start sm:items-center justify-center px-4 py-10">
  <div class="w-full max-w-md">

    <a routerLink="/" class="font-mono text-xs tracking-[0.2em] text-muted uppercase mb-2 inline-block hover:text-sage">Injector Companion</a>
    <h1 class="font-display text-2xl font-semibold text-ink mb-6">
      {{ mode() === 'login' ? 'Sign in' : 'Create account' }}
    </h1>

    <form class="bg-surface rounded-2xl shadow-sm border border-ink/5 p-5 space-y-5" (ngSubmit)="submit()">

      <div>
        <label for="email" class="block text-sm font-medium text-ink mb-2">Email</label>
        <input
          id="email"
          type="email"
          autocomplete="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          placeholder="you@example.com"
          class="w-full font-mono text-base rounded-lg border border-ink/15 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-sage/30 focus:border-sage" />
      </div>

      <div>
        <label for="password" class="block text-sm font-medium text-ink mb-2">Password</label>
        <input
          id="password"
          type="password"
          [autocomplete]="mode() === 'login' ? 'current-password' : 'new-password'"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          placeholder="••••••••"
          class="w-full font-mono text-base rounded-lg border border-ink/15 px-3 py-2.5 focus:outline-none focus:ring-2 focus:ring-sage/30 focus:border-sage" />
      </div>

      @if (error()) {
        <p class="text-sm text-terracotta">{{ error() }}</p>
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full bg-sage hover:bg-sage-dark text-white font-medium text-sm rounded-lg py-2.5 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
        {{ loading() ? 'Please wait…' : (mode() === 'login' ? 'Sign in' : 'Create account') }}
      </button>

      <p class="text-sm text-muted text-center">
        @if (mode() === 'login') {
          Don't have an account?
          <button type="button" (click)="toggleMode()" class="text-sage font-medium hover:text-sage-dark">Sign up</button>
        } @else {
          Already have an account?
          <button type="button" (click)="toggleMode()" class="text-sage font-medium hover:text-sage-dark">Sign in</button>
        }
      </p>

    </form>
  </div>
</div>
